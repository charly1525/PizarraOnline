<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra a Resumen</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f11;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #18181c;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            border: 1px solid #2c2c35;
        }
        h1 { color: #ffffff; font-size: 24px; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #9a9a1a; margin-bottom: 25px; font-weight: bold;}
        label { font-weight: bold; margin-top: 15px; display: block; font-size: 14px; color: #b5b5bd;}
        input[type="file"] {
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px;
            background: #222227; border: 1px solid #3a3a44; border-radius: 6px; 
            color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background-color: #c41e3a; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        button:hover { background-color: #a0182e; }
        button:disabled { background-color: #4a4a52; cursor: not-allowed; }
        #loader { text-align: center; display: none; margin-top: 15px; font-weight: bold; color: #ff9f43; }
        #resultado {
            margin-top: 20px; padding: 15px; background: #1e272e;
            border-left: 5px solid #c41e3a; border-radius: 4px; display: none;
            white-space: pre-wrap; line-height: 1.6; color: #dcdcdc;
        }
        #preview { max-width: 100%; margin-top: 10px; border-radius: 6px; display: none; border: 1px solid #3a3a44; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Pizarra a Resumen </h1>
    <p class="subtitle">Optimiza tu tiempo de estudio. Sube fotografías de pizarrones o libretas y la plataforma las transformará en apuntes digitales estructurados y listos para repasar.</p>

    <label for="imageUpload">Agrega aquí tus fotos</label>
    <input type="file" id="imageUpload" accept="image/*">
    <img id="preview" alt="Vista previa de la imagen">

    <button id="btnProcesar">Generar apuntes </button>

    <div id="loader">El backend está procesando tu imagen con IA... ⏳</div>
    <div id="resultado"></div>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    let base64Image = "";

    imageUpload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                base64Image = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnProcesar').addEventListener('click', async () => {
        const resultadoDiv = document.getElementById('resultado');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btnProcesar');

        if (!base64Image) {
            alert("Por favor, sube una imagen primero.");
            return;
        }

        btn.disabled = true;
        loader.style.display = 'block';
        resultadoDiv.style.display = 'none';

        // LLAMADA AL BACKEND PROPIO EN LUGAR DE GOOGLE DIRECTAMENTE
        const url = "/api/resumen"; 

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ base64Image: base64Image })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || "Error desconocido en el servidor");
            }

            resultadoDiv.textContent = data.resumen;
            resultadoDiv.style.display = 'block';

        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });
</script>

</body>
</html>
