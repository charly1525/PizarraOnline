<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra a Resumen | Micro SaaS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #2c3e50; font-size: 24px; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; }
        label { font-weight: bold; margin-top: 15px; display: block; font-size: 14px;}
        input[type="password"], input[type="file"] {
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px;
            border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background-color: #3498db; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #loader { text-align: center; display: none; margin-top: 15px; font-weight: bold; color: #e67e22; }
        #resultado {
            margin-top: 20px; padding: 15px; background: #e8f8f5;
            border-left: 5px solid #1abc9c; border-radius: 4px; display: none;
            white-space: pre-wrap; line-height: 1.6;
        }
        #preview { max-width: 100%; margin-top: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Pizarra a Resumen</h1>
    <p class="subtitle">Sube la foto de tus apuntes y la IA generará un resumen de estudio.</p>

    <label for="apiKey">Clave API de Google (Gemini):</label>
    <input type="password" id="apiKey" placeholder="Pega tu API Key aquí para mayor seguridad...">

    <label for="imageUpload">Sube la foto de la pizarra o cuaderno:</label>
    <input type="file" id="imageUpload" accept="image/*">
    <img id="preview" alt="Vista previa de la imagen">

    <button id="btnProcesar">Generar Resumen Mágico</button>

    <div id="loader">Analizando la imagen con Visión Artificial y NLP... ⏳</div>
    <div id="resultado"></div>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    let base64Image = "";

    // Mostrar vista previa y convertir imagen a Base64
    imageUpload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                // Extraer solo la parte base64 sin el prefijo "data:image/jpeg;base64,"
                base64Image = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('btnProcesar').addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        const resultadoDiv = document.getElementById('resultado');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('btnProcesar');

        if (!apiKey || !base64Image) {
            alert("Por favor, ingresa tu API Key y sube una imagen.");
            return;
        }

        // Preparar la interfaz
        btn.disabled = true;
        loader.style.display = 'block';
        resultadoDiv.style.display = 'none';

        // Prompt de NLP
        const prompt = "Actúa como un profesor experto. Extrae todo el texto y conocimiento de esta imagen de una pizarra o apunte. Limpia el texto, corrige la ortografía, estructúralo lógicamente y genera un resumen en viñetas fácil de estudiar. Evita inventar datos que no estén en la foto.";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{
                parts: [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            }]
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            // Mostrar el resultado NLP
            const textoResumen = data.candidates[0].content.parts[0].text;
            resultadoDiv.textContent = textoResumen;
            resultadoDiv.style.display = 'block';

        } catch (error) {
            alert("Error al procesar: " + error.message);
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    });
</script>

</body>
</html>
